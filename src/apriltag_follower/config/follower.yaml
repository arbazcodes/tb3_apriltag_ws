apriltag_follower:
  ros__parameters:
    use_sim_time: true

    # Minimum confidence needed to use a detection
    min_detection_margin: 60.0

    # Distance to keep from the tag, m
    desired_distance_m: 1.0

    # Controller gains
    linear_gain: 1.0
    angular_gain: 1.2

    # Speed limits
    max_linear_speed: 0.22
    max_angular_speed: 1.0

    # Turning speed while searching
    search_turn_speed: 0.35

    # Time before the tag is considered lost, s
    tracking_timeout: 1.0

    # Control loop frequency
    control_rate_hz: 20.0

    # Topics
    detections_topic: "/detections"
    cmd_vel_topic: "/cmd_vel"